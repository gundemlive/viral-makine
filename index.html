<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Makine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #090909;
    color: #f0f0f0;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #e63946, #f4a261);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: #333;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .input-bar {
    max-width: 900px;
    margin: 0 auto 28px;
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .input-bar textarea {
    flex: 1;
    background: #111;
    border: 1px solid #222;
    color: #eee;
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.92rem;
    resize: none;
    height: 68px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .input-bar textarea:focus { border-color: #e63946; }
  .input-bar textarea::placeholder { color: #2a2a2a; }

  .btn-uret {
    background: linear-gradient(135deg, #e63946, #f4a261);
    color: #fff;
    border: none;
    padding: 0 22px;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-uret:hover { opacity: 0.85; }
  .btn-uret:active { transform: scale(0.97); }
  .btn-uret:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-temizle {
    background: #141414;
    color: #444;
    border: 1px solid #222;
    padding: 0 16px;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-temizle:hover { background: #1e1e1e; color: #888; border-color: #333; }
  .btn-temizle:active { transform: scale(0.97); }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    max-width: 1300px;
    margin: 0 auto;
    gap: 0;
  }

  .panel { padding: 0 22px; }
  .panel:first-child { padding-left: 0; }
  .panel:last-child { padding-right: 0; }

  .divider { background: #1c1c1c; }

  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid #161616;
  }

  .panel-badge {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .panel-q .panel-badge { background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); }
  .panel-c .panel-badge { background: rgba(244,162,97,0.15); border: 1px solid rgba(244,162,97,0.3); }

  .panel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
  }

  .panel-q .panel-name { color: #e63946; }
  .panel-c .panel-name { color: #f4a261; }

  .panel-hint {
    font-size: 0.7rem;
    color: #333;
    letter-spacing: 1px;
    margin-left: auto;
  }

  .items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 160px;
  }

  .card {
    background: #0f0f0f;
    border: 1px solid #181818;
    border-radius: 6px;
    padding: 13px 15px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .panel-q .card { border-left: 2px solid #e63946; }
  .panel-c .card { border-left: 2px solid #f4a261; }
  .card:hover { background: #131313; }

  .card-text {
    flex: 1;
    font-size: 0.87rem;
    line-height: 1.65;
    color: #bbb;
  }

  .grok { color: #e63946; font-weight: 600; }

  .btn-kopyala {
    background: #161616;
    border: 1px solid #1e1e1e;
    color: #444;
    padding: 5px 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
    text-transform: uppercase;
  }

  .panel-q .btn-kopyala:hover { background: #e63946; border-color: #e63946; color: #fff; }
  .panel-c .btn-kopyala:hover { background: #f4a261; border-color: #f4a261; color: #000; }
  .btn-kopyala.ok { background: #0a1f0a; border-color: #1a3d1a; color: #4caf50; }

  .empty {
    text-align: center;
    color: #1e1e1e;
    font-size: 0.78rem;
    padding: 48px 0;
    letter-spacing: 2px;
    border: 1px dashed #141414;
    border-radius: 6px;
  }

  .yukluyor {
    text-align: center;
    padding: 48px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid #1e1e1e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .panel-q .spinner { border-top-color: #e63946; }
  .panel-c .spinner { border-top-color: #f4a261; }

  .yukluyor span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: #2a2a2a;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 800px) {
    .panels { grid-template-columns: 1fr; }
    .divider { display: none; }
    .panel { padding: 0 0 28px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>VİRAL MAKİNE</h1>
  <p>Soru & Yorum Üretici — @grok için</p>
</div>

<div class="input-bar">
  <textarea id="konu" placeholder="Haber başlığını buraya yaz... (Enter ile üret)"></textarea>
  <button class="btn-uret" id="btnUret" onclick="uretHepsi()">ÜRET</button>
  <button class="btn-temizle" onclick="temizle()">TEMİZLE</button>
</div>

<div class="panels">

  <div class="panel panel-q">
    <div class="panel-head">
      <div class="panel-badge">❓</div>
      <div class="panel-name">SORU ÜRETİCİ</div>
      <div class="panel-hint">@grok'a sorulacak</div>
    </div>
    <div class="items" id="sorular">
      <div class="empty">BAŞLIK YAZ VE ÜRET'E BAS</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel panel-c">
    <div class="panel-head">
      <div class="panel-badge">💬</div>
      <div class="panel-name">YORUM ÜRETİCİ</div>
      <div class="panel-hint">habere atılacak</div>
    </div>
    <div class="items" id="yorumlar">
      <div class="empty">BAŞLIK YAZ VE ÜRET'E BAS</div>
    </div>
  </div>

</div>

<script>
const OPENROUTER_API_KEY = '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';
const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';

const SORU_ACILARI = [
  "ekonomik güç dengesi ve para izi açısından bak",
  "tarihsel benzerlikler ve tekrar eden kalıplar açısından değerlendir",
  "psikoloji ve insan doğasının karanlık yüzü açısından sor",
  "jeopolitik strateji ve kim ne kazanıyor açısından sor",
  "toplumsal çürüme ve çifte standart açısından bak",
  "medya manipülasyonu ve neyin saklandığı açısından sor",
  "güç, korku ve sessizlik üçgeni açısından değerlendir"
];

const SORU_PROMPT = (konu) => {
  const aci = SORU_ACILARI[Math.floor(Math.random() * SORU_ACILARI.length)];
  return `Sen dünyanın en zeki Twitter kullanıcısısın. Gazetecilik, tarih, psikoloji ve sokak zekasını harmanlıyorsun. Her soru bir zihin bombası olmalı. İnsanlar okuyunca "dur... bunun cevabı gerçekten ne?" diye @grok'a tıklamak zorunda kalmalı.

Haber: ${konu}

Bu habere "${aci}" açısından yaklaş ve 5 soru üret.

Her soru şunlardan BİRİNİ yapmalı:
1. Haberin arkasındaki GİZLİ gerçeği ima et (komplo değil, zekice tespit)
2. İnsanların hiç düşünmediği bir açıyı zorla
3. Hem merak hem tartışma yaratan bir gerilim kur
4. Komik ama içinde acı bir gerçek taşıyan zeka göster
5. "Bunu sormak cesaret ister" dedirten korkusuz bir şey sor

HABERİN TONUNA GÖRE:
- Savaş/ölüm/kriz → Soğukkanlı, keskin, kaos çıkarıcı
- Magazin/spor/komik → Alaycı ama zekice, güldürürken gerçeği gömer
- Siyaset/ekonomi → Kafayı karıştır ama doğru yerden

@grok kullanımı: Her soruda farklı pozisyonda olsun. "Abi @grok söyle..." "Peki @grok..." "...bunu @grok bile bilir mi?" gibi doğal geçişler kur.

ASLA YAPMA: tire ( — veya - ), çizgi, numara, madde işareti, klişe sorular, bot kokusu, açıklama, uzun cümleler

UZUNLUK: Sorular kısa ve vurucu olsun. Mümkün olduğunca az kelimeyle maksimum merak uyandır. Kısa soru = daha fazla tıklama.

Sadece 5 soru. Her biri yeni satırda. Başka hiçbir şey yazma.`;
};

const YORUM_STILLERI = [
  "soğukkanlı ve keskin: herkesin gördüğünü ama kimsenin söylemediğini söyle",
  "alaycı ve zekice: güldürürken içine bir gerçek göm",
  "korkusuz ve provokasyon: tartışma başlat, taraf seçtir",
  "ironik ve acı: olayın absürtlüğünü ortaya çıkar",
  "felsefeci sokak abisi: derin ama anlaşılır, düşündürücü",
  "sert gerçekçi: sugarcoating yok, olduğu gibi söyle",
  "kaos mühendisi: insanları birbirine düşürecek ama zekice bir şey söyle"
];

const YORUM_PROMPT = (konu) => {
  const stil = YORUM_STILLERI[Math.floor(Math.random() * YORUM_STILLERI.length)];
  return `Sen Twitter'da etkileşimi patlatan yorumlar yapıyorsun. Bot değilsin. Zeki, cesur, korkusuz ve duruma göre acımasızsın.

Haber: ${konu}

Bu sefer tarzın: "${stil}"

5 yorum üret. Her yorum şu özelliklerden birini taşımalı:
1. "Aynen ya kimse bunu söylemiyordu" dedirten CESUR tespit
2. "Ahahaha ama bir dakika bu çok doğru" dedirten KOMİK ama gerçek
3. "Vay be hiç bu açıdan bakmamıştım" dedirten ZEKİ gözlem
4. İnsanları tartışmaya çeken KAOS başlatıcı
5. "Bunu RT etmem lazım" dedirten VURUCU cümle

YORUM YAZARKEN:
- Maksimum 2-3 cümle. Kısa ve vurucu.
- Türkçe sokak dili kullanabilirsin ama kaba olmadan
- Bazen soru gibi bitir, bazen keskin tespit, bazen ironi
- Haberin ciddi/komik tonuna göre kendini ayarla

ASLA YAPMA: tire, çizgi, numara, madde işareti, resmi haber dili, uzun paragraf, açıklama

Sadece 5 yorum. Her biri yeni satırda. Başka hiçbir şey yazma.`;
};

function grokVurgula(text) {
  return text.replace(/@grok/gi, '<span class="grok">@grok</span>');
}

function yukluyor(id) {
  document.getElementById(id).innerHTML = `
    <div class="yukluyor">
      <div class="spinner"></div>
      <span>ÜRETİLİYOR...</span>
    </div>`;
}

function metinKaydet(listId, items) {
  items.forEach((item, i) => { window['_v_' + listId + '_' + i] = item; });
}

function kopyala(btn, listId, i) {
  const text = window['_v_' + listId + '_' + i];
  if (!text) return;
  const kopyalaFn = () => {
    btn.textContent = 'KOPYALANDI ✓';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'KOPYALA'; btn.classList.remove('ok'); }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(kopyalaFn).catch(() => fallback(btn, text, kopyalaFn));
  } else {
    fallback(btn, text, kopyalaFn);
  }
}

function fallback(btn, text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) { btn.textContent = 'HATA'; }
  document.body.removeChild(ta);
}

function goster(listId, items) {
  const el = document.getElementById(listId);
  if (!items.length) { el.innerHTML = '<div class="empty">İÇERİK ÜRETİLEMEDİ</div>'; return; }
  metinKaydet(listId, items);
  el.innerHTML = items.map((item, i) => `
    <div class="card">
      <div class="card-text">${grokVurgula(item)}</div>
      <button class="btn-kopyala" onclick="kopyala(this,'${listId}',${i})">KOPYALA</button>
    </div>`).join('');
}

async function apiCagir(prompt, listId) {
  yukluyor(listId);
  try {
    const res = await fetch(OPENROUTER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENROUTER_API_KEY}`
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-3.3-70b-instruct:free',
        max_tokens: 1200,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.choices[0].message.content.trim();
    const items = text.split('\n').map(l => l.trim()).filter(l => l.length > 10).slice(0, 5);
    goster(listId, items);
  } catch(e) {
    document.getElementById(listId).innerHTML = '<div class="empty">HATA OLUŞTU, TEKRAR DENE</div>';
  }
}

async function uretHepsi() {
  const konu = document.getElementById('konu').value.trim();
  if (!konu) return;
  document.getElementById('btnUret').disabled = true;
  await Promise.all([
    apiCagir(SORU_PROMPT(konu), 'sorular'),
    apiCagir(YORUM_PROMPT(konu), 'yorumlar')
  ]);
  document.getElementById('btnUret').disabled = false;
}

function temizle() {
  document.getElementById('konu').value = '';
  document.getElementById('sorular').innerHTML = '<div class="empty">BAŞLIK YAZ VE ÜRET\'E BAS</div>';
  document.getElementById('yorumlar').innerHTML = '<div class="empty">BAŞLIK YAZ VE ÜRET\'E BAS</div>';
  document.getElementById('konu').focus();
}

document.getElementById('konu').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); uretHepsi(); }
});
</script>
</body>
</html>
